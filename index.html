<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#b4e4f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bing – Il coniglietto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: #b4e4f7;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: #b4e4f7;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-tap-highlight-color: transparent;
    }
    #canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      touch-action: none;
    }
    #micBtn {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #ff9f68;
      color: white;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(92, 74, 58, 0.25);
      z-index: 10;
      transition: transform 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #micBtn:hover { background: #e88b52; transform: translateX(-50%) scale(1.05); }
    #micBtn:active { transform: translateX(-50%) scale(0.98); }
    #micBtn.ascolto { background: #e85a5a; animation: pulse 1s ease infinite; }
    @keyframes pulse { 50% { box-shadow: 0 0 0 12px rgba(232, 90, 90, 0.3); } }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <button type="button" id="micBtn" aria-label="Parla a Bing">🎤</button>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
